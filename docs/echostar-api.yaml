openapi: 3.0.3
info:
  title: EchoStar API
  description: |
    EchoStar 情绪地图社交应用 - 后端API接口文档

    ## 认证说明
    大部分接口需要JWT Token认证，请在请求头中添加：
    ```
    Authorization: Bearer <your_token>
    ```

    ## 响应格式
    所有接口返回统一格式：
    ```json
    {
      "code": 0,
      "message": "成功",
      "data": {}
    }
    ```

    - `code`: 状态码，0表示成功，非0表示失败
    - `message`: 提示信息
    - `data`: 返回数据

  version: 1.0.0
  contact:
    name: EchoStar Team
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api
    description: 本地开发环境
  - url: https://api.echostar.com/api
    description: 生产环境

tags:
  - name: 认证 (Auth)
    description: 用户认证相关接口
  - name: 故事 (Story)
    description: 故事相关接口
  - name: 评论 (Comment)
    description: 评论相关接口
  - name: 点赞 (Like)
    description: 点赞相关接口
  - name: 收藏 (Favorite)
    description: 收藏相关接口
  - name: 地图 (Map)
    description: 地图相关接口
  - name: 通知 (Notification)
    description: 通知相关接口
  - name: 举报 (Report)
    description: 举报相关接口
  - name: 管理员 (Admin)
    description: 管理员相关接口

paths:
  /auth/send-code:
    post:
      tags:
        - 认证 (Auth)
      summary: 发送邮箱验证码
      description: 发送邮箱验证码，60秒内只能发送一次
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "验证码已发送"
                  data:
                    type: object
                    properties:
                      expireTime:
                        type: integer
                        description: 过期时间（秒）
                        example: 300

  /auth/register:
    post:
      tags:
        - 认证 (Auth)
      summary: 用户注册
      description: 用户注册（需要验证码）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - username
                - verificationCode
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 20
                  example: "password123"
                username:
                  type: string
                  minLength: 2
                  maxLength: 20
                  example: "张三"
                verificationCode:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/register_2:
    post:
      tags:
        - 认证 (Auth)
      summary: 用户注册（测试用）
      description: 用户注册（不需要验证码，仅用于测试）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - username
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 20
                  example: "password123"
                username:
                  type: string
                  minLength: 2
                  maxLength: 20
                  example: "张三"
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags:
        - 认证 (Auth)
      summary: 用户登录
      description: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /admin/login:
    post:
      tags:
        - 认证 (Auth)
      summary: 管理员登录
      description: 管理员登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@example.com"
                password:
                  type: string
                  format: password
                  example: "admin123"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/me:
    get:
      tags:
        - 认证 (Auth)
      summary: 获取当前用户信息
      description: 获取当前登录用户的信息
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/User'
    delete:
      tags:
        - 认证 (Auth)
      summary: 注销账号
      description: 删除当前用户的账号
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 注销成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "注销成功"

  /auth/users/{userId}:
    get:
      tags:
        - 认证 (Auth)
      summary: 查看其他用户信息
      description: 根据用户ID查看用户信息
      security: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/User'

  /users/me:
    put:
      tags:
        - 认证 (Auth)
      summary: 修改个人信息
      description: 修改当前用户的个人信息
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 2
                  maxLength: 20
                  example: "张三"
                avatarUrl:
                  type: string
                  format: uri
                  example: "https://example.com/avatar.jpg"
                bio:
                  type: string
                  maxLength: 200
                  example: "这是我的个人简介"
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/User'

  /users/me/password:
    put:
      tags:
        - 认证 (Auth)
      summary: 修改密码
      description: 修改当前用户的密码
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  format: password
                  example: "oldpassword123"
                newPassword:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 20
                  example: "newpassword123"
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "修改密码成功"

  /auth/forgot-password:
    post:
      tags:
        - 认证 (Auth)
      summary: 忘记密码
      description: 通过邮箱验证码重置密码
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - verificationCode
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 20
                  example: "newpassword123"
                verificationCode:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "密码重置成功"

  /auth/avatar/upload-token:
    get:
      tags:
        - 认证 (Auth)
      summary: 获取头像上传凭证
      description: 获取OSS上传凭证用于上传头像
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      uploadToken:
                        type: string
                        description: OSS上传token
                      host:
                        type: string
                        description: OSS上传域名
                      dir:
                        type: string
                        description: 上传目录

  /auth/admin/users:
    get:
      tags:
        - 认证 (Auth)
      summary: 获取所有用户列表（管理员）
      description: 管理员获取所有用户列表
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string
            enum: [normal, banned, admin]
            default: normal
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
                      total:
                        type: integer
                      page:
                        type: integer
                      pageSize:
                        type: integer

  /stories:
    post:
      tags:
        - 故事 (Story)
      summary: 发布故事
      description: 创建并发布一个新的故事
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
                - images
                - location
                - emotionTag
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                  example: "今天天气真好，出来散散步！"
                images:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 0
                  maxItems: 9
                  example: ["https://example.com/image1.jpg"]
                location:
                  type: object
                  required:
                    - lat
                    - lng
                  properties:
                    lat:
                      type: number
                      minimum: -90
                      maximum: 90
                      example: 39.9042
                    lng:
                      type: number
                      minimum: -180
                      maximum: 180
                      example: 116.4074
                locationName:
                  type: string
                  example: "北京市朝阳区"
                emotionTag:
                  type: string
                  enum:
                    - 治愈
                    - 难过
                    - 开心
                    - 打卡
                  example: "开心"
                isTimeCapsule:
                  type: boolean
                  default: false
                  example: false
                unlockAt:
                  type: string
                  format: date-time
                  description: 时光胶囊解锁时间（isTimeCapsule为true时必填）
                  example: "2024-12-31T23:59:59Z"
                visibility:
                  type: string
                  enum:
                    - public
                    - shadowban
                  default: public
                  example: public
                visibilityStartTime:
                  type: string
                  pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
                  example: "22:00"
                visibilityEndTime:
                  type: string
                  pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
                  example: "06:00"
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/Story'

  /stories/me/list:
    get:
      tags:
        - 故事 (Story)
      summary: 我的故事列表
      description: 获取当前用户的故事列表
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      stories:
                        type: array
                        items:
                          $ref: '#/components/schemas/Story'
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer

  /stories/upload-token:
    get:
      tags:
        - 故事 (Story)
      summary: 获取故事图片上传凭证
      description: 获取OSS上传凭证用于上传故事图片
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      uploadToken:
                        type: string
                      host:
                        type: string
                      dir:
                        type: string

  /stories/search:
    get:
      tags:
        - 故事 (Story)
      summary: 搜索故事
      description: 根据关键词搜索故事（模糊匹配content）
      security:
        - BearerAuth: []
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      stories:
                        type: array
                        items:
                          $ref: '#/components/schemas/Story'
                      total:
                        type: integer

  /stories/{id}:
    get:
      tags:
        - 故事 (Story)
      summary: 查看故事详情
      description: 根据故事ID查看故事详情
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/Story'
    post:
      tags:
        - 故事 (Story)
      summary: 修改故事内容
      description: 修改故事的内容和情绪标签（只能修改自己的故事）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                  example: "修改后的内容"
                emotionTag:
                  type: string
                  enum:
                    - 治愈
                    - 难过
                    - 开心
                    - 打卡
                  example: "治愈"
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/Story'
    delete:
      tags:
        - 故事 (Story)
      summary: 删除故事
      description: 删除指定的故事（只能删除自己的故事）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "删除成功"

  /stories/{id}/visibility:
    put:
      tags:
        - 故事 (Story)
      summary: 修改故事可见性
      description: 修改故事的可见性（只能修改自己的故事）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - visibility
              properties:
                visibility:
                  type: string
                  enum:
                    - public
                    - shadowban
                  example: public
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/Story'

  /stories/{id}/unlock:
    post:
      tags:
        - 故事 (Story)
      summary: 解锁时光胶囊
      description: 解锁时光胶囊（通常由定时任务调用）
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 解锁成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "时光胶囊已解锁"

  /stories/admin/all:
    get:
      tags:
        - 故事 (Story)
      summary: 获取所有故事（管理员）
      description: 管理员获取所有故事
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: visibility
          in: query
          schema:
            type: string
            enum:
              - public
              - shadowban
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      stories:
                        type: array
                        items:
                          $ref: '#/components/schemas/Story'
                      total:
                        type: integer

  /comments:
    post:
      tags:
        - 评论 (Comment)
      summary: 创建评论
      description: 对指定故事创建评论
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - storyId
                - content
              properties:
                storyId:
                  type: integer
                  example: 1
                content:
                  type: string
                  minLength: 1
                  maxLength: 500
                  example: "很有趣的故事！"
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/Comment'

  /comments/search:
    get:
      tags:
        - 评论 (Comment)
      summary: 搜索评论
      description: 根据关键词搜索评论
      security: []
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      comments:
                        type: array
                        items:
                          $ref: '#/components/schemas/Comment'
                      total:
                        type: integer

  /comments/me:
    get:
      tags:
        - 评论 (Comment)
      summary: 获取当前用户的评论列表
      description: 获取当前用户的所有评论
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    type: object
                    properties:
                      comments:
                        type: array
                        items:
                          $ref: '#/components/schemas/Comment'
                      total:
                        type: integer

  /comments/story/{storyId}:
    get:
      tags:
        - 评论 (Comment)
      summary: 获取故事评论列表
      description: 获取指定故事的所有评论
      security: []
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
