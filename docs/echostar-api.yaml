components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT认证token，从登录接口获取

  schemas:
    AuthResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "登录成功"
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT Token
            user:
              $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          example: "1234567890"
        email:
          type: string
          format: email
          example: "user@example.com"
        username:
          type: string
          example: "张三"
        avatarUrl:
          type: string
          format: uri
          example: "https://example.com/avatar.jpg"
        bio:
          type: string
          example: "这是我的个人简介"
        role:
          type: string
          enum:
            - user
            - admin
          example: user
        isBanned:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"

    Story:
      type: object
      properties:
        id:
          type: string
          example: "1234567890"
        userId:
          type: string
          example: "1234567890"
        content:
          type: string
          example: "今天天气真好，出来散散步！"
        images:
          type: array
          items:
            type: string
            format: uri
          example: ["https://example.com/image1.jpg"]
        location:
          type: object
          properties:
            lat:
              type: number
              example: 39.9042
            lng:
              type: number
              example: 116.4074
        locationName:
          type: string
          example: "北京市朝阳区"
        emotionTag:
          type: string
          enum:
            - 治愈
            - 难过
            - 开心
            - 打卡
          example: "开心"
        visibility:
          type: string
          enum:
            - public
            - shadowban
          example: public
        visibilityStartTime:
          type: string
          example: "22:00"
        visibilityEndTime:
          type: string
          example: "06:00"
        isTimeCapsule:
          type: boolean
          example: false
        unlockAt:
          type: string
          format: date-time
          nullable: true
        isRecommended:
          type: boolean
          example: false
        viewCount:
          type: integer
          example: 100
        likeCount:
          type: integer
          example: 10
        commentCount:
          type: integer
          example: 5
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        user:
          $ref: '#/components/schemas/User'

    Comment:
      type: object
      properties:
        id:
          type: string
          example: "1234567890"
        storyId:
          type: string
          example: "1234567890"
        userId:
          type: string
          example: "1234567890"
        content:
          type: string
          example: "很有趣的故事！"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        user:
          $ref: '#/components/schemas/User'

    Like:
      type: object
      properties:
        id:
          type: string
          example: "1234567890"
        storyId:
          type: string
          example: "1234567890"
        userId:
          type: string
          example: "1234567890"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        user:
          $ref: '#/components/schemas/User'

    Favorite:
      type: object
      properties:
        id:
          type: string
          example: "1234567890"
        storyId:
          type: string
          example: "1234567890"
        userId:
          type: string
          example: "1234567890"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        story:
          $ref: '#/components/schemas/Story'

    Notification:
      type: object
      properties:
        id:
          type: string
          example: "1234567890"
        toUserId:
          type: string
          example: "1234567890"
        fromUserId:
          type: string
          example: "1234567890"
        storyId:
          type: string
          example: "1234567890"
        type:
          type: string
          enum:
            - like
            - comment
            - follow
            - system
          example: like
        content:
          type: string
          example: "有人点赞了你的故事"
        isRead:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        fromUser:
          $ref: '#/components/schemas/User'

    Report:
      type: object
      properties:
        id:
          type: string
          example: "1234567890"
        targetType:
          type: string
          enum:
            - story
            - comment
          example: story
        targetId:
          type: string
          example: "1234567890"
        reporterId:
          type: string
          example: "1234567890"
        reason:
          type: string
          example: "内容违规"
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
          example: pending
        handledBy:
          type: string
          nullable: true
        handledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        reporter:
          $ref: '#/components/schemas/User'
