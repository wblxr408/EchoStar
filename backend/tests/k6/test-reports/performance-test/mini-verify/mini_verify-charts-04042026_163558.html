<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoStar 性能测试图表</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
  .header { text-align: center; margin-bottom: 30px; }
  .header h1 { font-size: 1.8em; color: #38bdf8; margin-bottom: 8px; }
  .header .meta { color: #94a3b8; font-size: 0.9em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 20px; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  .card h2 { font-size: 1.1em; color: #38bdf8; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
  .chart-container { position: relative; height: 300px; }
  .inflection-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .inflection-table th, .inflection-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #334155; }
  .inflection-table th { color: #94a3b8; font-size: 0.85em; text-transform: uppercase; }
  .inflection-table .warning { color: #fbbf24; }
  .inflection-table .danger { color: #f87171; }
  .summary-cards { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
  .summary-card { background: #1e293b; border-radius: 8px; padding: 15px 20px; flex: 1; min-width: 150px; }
  .summary-card .value { font-size: 1.5em; font-weight: bold; }
  .summary-card .label { color: #94a3b8; font-size: 0.85em; margin-top: 4px; }
  .grade-excellent { color: #4ade80; }
  .grade-good { color: #a3e635; }
  .grade-acceptable { color: #fbbf24; }
  .grade-slow { color: #f97316; }
  .grade-critical { color: #ef4444; }
</style>
</head>
<body>

<div class="header">
  <h1>EchoStar 性能测试图表</h1>
  <div class="meta">
    测试时间: 2026/4/4 16:36:11
    &nbsp;|&nbsp; 总请求: 2,077
    &nbsp;|&nbsp; 持续: 2.2 分钟
  </div>
</div>

<div class="summary-cards">
  
    <div class="summary-card">
      <div class="value">22</div>
      <div class="label">峰值吞吐量 (req/s)</div>
    </div>
    <div class="summary-card">
      <div class="value grade-excellent">55ms</div>
      <div class="label">最终阶段 P95</div>
    </div>
    <div class="summary-card">
      <div class="value">30</div>
      <div class="label">最大并发 VUs</div>
    </div>
    <div class="summary-card">
      <div class="value">1,982</div>
      <div class="label">总请求数</div>
    </div>
    <div class="summary-card">
      <div class="value">32.52%</div>
      <div class="label">最终阶段错误率</div>
    </div>
  
</div>

<div class="grid">
  <div class="card">
    <h2>响应时间 P50 / P95 / P99 随 VUs 变化</h2>
    <div class="chart-container"><canvas id="responseTimeChart"></canvas></div>
  </div>

  <div class="card">
    <h2>吞吐量 (RPS) 随 VUs 变化</h2>
    <div class="chart-container"><canvas id="rpsChart"></canvas></div>
  </div>

  
  <div class="card" style="grid-column: 1 / -1;">
    <h2>各接口 P95 响应时间对比</h2>
    <div class="chart-container" style="height: 550px;"><canvas id="endpointChart"></canvas></div>
  </div>

  
  <div class="card" style="grid-column: 1 / -1;">
    <h2>检测到的性能拐点</h2>
    <table class="inflection-table">
      <thead><tr><th>类型</th><th>阶段</th><th>VUs</th><th>详情</th></tr></thead>
      <tbody>
        <tr class="warning"><td>吞吐量下降</td><td>30vus</td><td>30</td><td>RPS: 22.3 → 15.8 (-29.4%)</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// 响应时间图表
const ctx1 = document.getElementById('responseTimeChart');
if (ctx1) new Chart(ctx1, {
  type: 'line',
  data: {
    labels: ["5vus (0m)","9vus (0m)","12vus (0m)","15vus (0m)","18vus (0m)","21vus (0m)","24vus (0m)","30vus (1m)"],
    datasets: [
      { label: 'P50', data: [6.45,6.18,6.96,5.95,7.02,6.37,6.96,6.56], borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.1)', fill: true, tension: 0.3 },
      { label: 'P95', data: [16.74,53.89,33.32,54.31,55.19,37.81,54.48,54.75], borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.1)', fill: true, tension: 0.3 },
      { label: 'P99', data: [61.18,60.03,58.76,58.13,60.76,57.93,61.47,59.83], borderColor: '#f87171', backgroundColor: 'rgba(248,113,113,0.1)', fill: true, tension: 0.3 },
      { label: 'Avg', data: [10.21,11.43,11.36,11.94,12.88,12.07,12.99,13.01], borderColor: '#38bdf8', borderDash: [5,5], tension: 0.3 },
    ]
  },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#e2e8f0' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { title: { display: true, text: 'ms', color: '#94a3b8' }, ticks: { color: '#94a3b8' } } } }
});

// 吞吐量图表

  type: 'bar',

    labels: ["5vus (0m)","9vus (0m)","12vus (0m)","15vus (0m)","18vus (0m)","21vus (0m)","24vus (0m)","30vus (1m)"],
    datasets: [
      { label: 'RPS', data: [5.31,10.67,11,16.25,16.73,18.92,22.33,15.77], backgroundColor: 'rgba(56,189,248,0.6)', borderColor: '#38bdf8', borderWidth: 1 },
    ]
  },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#e2e8f0' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { title: { display: true, text: 'req/s', color: '#94a3b8' }, ticks: { color: '#94a3b8' } } } }
});


// 各接口 P95 对比

if (ctx3) new Chart(ctx3, {
  type: 'line',
  data: {
    labels: ["5vus (0m)","9vus (0m)","12vus (0m)","15vus (0m)","18vus (0m)","21vus (0m)","24vus (0m)","30vus (1m)"],
    datasets: [{"label":"map_explore","data":[61.18,24.62,5.84,5.45,6.04,5.88,5.69,5.51],"borderColor":"#38bdf8","tension":0.3},{"label":"get_story","data":[15.76,16.24,15.85,16.89,16.72,16.14,17.38,17.56],"borderColor":"#4ade80","tension":0.3},{"label":"get_user","data":[8.44,6.87,5.85,5.69,6.31,6.07,5.98,6.19],"borderColor":"#fbbf24","tension":0.3},{"label":"search_story","data":[11.73,8.26,10.43,7.77,7.71,8.91,7.73,7.57],"borderColor":"#f87171","tension":0.3},{"label":"create_comment","data":[8.96,7.98,9.4,7.44,7.02,7.89,8.25,7.77],"borderColor":"#c084fc","tension":0.3},{"label":"list_comments","data":[5.44,5.45,5.23,6.11,5.02,5.31,6.68,6.02],"borderColor":"#fb923c","tension":0.3},{"label":"map_feed","data":[7.12,8.14,7.65,6.34,7.65,7.11,6.96,23.13],"borderColor":"#2dd4bf","tension":0.3},{"label":"mark_notif_read","data":[6.04,0,6.24,6.67,0,7.42,7.81,8.72],"borderColor":"#e879f9","tension":0.3},{"label":"favorite_toggle","data":[38.88,32.01,44.15,32.56,35.02,30.81,38.38,36.5],"borderColor":"#facc15","tension":0.3},{"label":"create_story","data":[5.55,6.06,7.37,6.59,7.91,7.28,7.83,7.2],"borderColor":"#f472b6","tension":0.3},{"label":"login","data":[54.51,61.55,58.76,58.13,56.55,57.87,68.32,58.7],"borderColor":"#38bdf8","tension":0.3},{"label":"update_profile","data":[0,12.6,10.15,11.82,11.57,10.21,8.75,12.57],"borderColor":"#4ade80","tension":0.3},{"label":"map_clusters","data":[0,4.66,0,5.75,3.68,0,4.39,4.98],"borderColor":"#fbbf24","tension":0.3},{"label":"list_notifications","data":[0,8.91,6.76,8.1,10.34,8.62,11.05,15.25],"borderColor":"#f87171","tension":0.3},{"label":"create_report","data":[0,14.68,12.73,13.97,10.24,10.11,14.7,11.63],"borderColor":"#c084fc","tension":0.3},{"label":"register","data":[0,60.03,62.06,59.88,63.16,60.27,65.9,61.47],"borderColor":"#fb923c","tension":0.3},{"label":"like_toggle","data":[0,0,32.75,34.69,35.71,39.11,32.5,35.64],"borderColor":"#2dd4bf","tension":0.3},{"label":"health_check","data":[0,0,1.83,1.68,0,1.66,1.99,2.09],"borderColor":"#e879f9","tension":0.3}]
  },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#e2e8f0' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { title: { display: true, text: 'P95 (ms)', color: '#94a3b8' }, ticks: { color: '#94a3b8', maxTicksLimit: 15 } } } }
});
</script>
</body>
</html>
